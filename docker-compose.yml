services:
  app:
    build: .
    container_name: timeweb-chat-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - CHAT_MAX_STEPS=${CHAT_MAX_STEPS:-8}
    networks:
      - timeweb-chat
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: timeweb-chat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - timeweb-chat
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  timeweb-chat:
    driver: bridge
